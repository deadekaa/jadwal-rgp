<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jadwal RGP MTC Deshi</title>

<style>
body {
    font-family: Arial, sans-serif;
    margin: 0;
    background: #f4f6f9;
}

/* STICKY TOPBAR */
.topbar {
    position: sticky;
    top: 0;
    z-index: 1000;
    background: white;
    box-shadow: 0 2px 8px rgba(0,0,0,0.1);
}

/* HEADER */
header {
    background: #2c3e50;
    color: white;
    text-align: center;
    padding: 12px;
    font-size: 14px;
}

/* TABS */
.tabs {
    display: flex;
    overflow-x: auto;
    border-bottom: 1px solid #ddd;
}

.tab-button {
    flex: 1;
    padding: 10px;
    font-size: 14px;
    border: none;
    background: none;
    cursor: pointer;
}

.tab-button.active {
    border-bottom: 3px solid #2c3e50;
    font-weight: bold;
}

/* SLIDER */
.slider {
    display: flex;
    width: 400%;
    transition: transform 0.35s ease;
}

.slide {
    width: 100%;
    flex-shrink: 0;
    padding: 10px;
}

/* NOTE */
.nav-note {
    font-size: 15px;
    font-weight: bold;
    text-align: center;
    margin-bottom: 10px;
    padding: 10px;
    border-radius: 10px;
}

.note-nav {
    color: #0b3d91;
    background: #e3f2fd;
    border: 2px solid #90caf9;
}

.note-info {
    color: #8a6d00;
    background: #fff8e1;
    border: 2px solid #ffd54f;
}

/* ANIMATION */
.pulse {
    animation: pulse 1.6s ease-in-out infinite;
}

@keyframes pulse {
    0% { transform: scale(1); }
    70% { transform: scale(1.03); }
    100% { transform: scale(1); }
}

/* IFRAME */
iframe {
    width: 100%;
    border-radius: 8px;
    border: none;
}

/* SWIPE AREA */
.swipe-container {
    overflow: hidden;
}

/* HEIGHT */
iframe { height: 600px; }
.week iframe { height: 1300px; }
.month iframe { height: 800px; }
.full iframe { height: 1400px; }

</style>
</head>

<body>

<div class="topbar">
<header>JADWAL RGP MTC Deshi</header>

<div class="tabs">
<button class="tab-button" onclick="goToSlide(0)">👩🏻‍🏫</button>
<button class="tab-button active" onclick="goToSlide(1)">📆</button>
<button class="tab-button" onclick="goToSlide(2)">📅</button>
<button class="tab-button" onclick="goToSlide(3)">📋</button>
</div>
</div>

<div class="swipe-container" id="swipeArea">
<div class="slider" id="slider">

<!-- AGENDA -->
<div class="slide">
<div class="nav-note note-nav">👉 Gunakan ❮ ❯ untuk pindah hari</div>
<iframe src="https://calendar.google.com/calendar/embed?height=600&wkst=2&ctz=Asia%2FJakarta&hl=id&mode=AGENDA&showTz=0&showCalendars=0&showTabs=0&src=YTJhMTBhNmZiNjgyMjBmM2JjNDU3MjA4ZDcxNjE5ZjljNWM4YzFlMzlkMjllNWFmZWJiMmRkZmI2MTU4NWI3NEBncm91cC5jYWxlbmRhci5nb29nbGUuY29t&src=aWQuaW5kb25lc2lhbiNob2xpZGF5QGdyb3VwLnYuY2FsZW5kYXIuZ29vZ2xlLmNvbQ&color=%23b39ddb&color=%23d81b60"></iframe>
</div>

<!-- WEEK -->
<div class="slide week">
<div class="nav-note note-nav">👉 Gunakan ❮ ❯ untuk pindah minggu</div>
<iframe src="https://calendar.google.com/calendar/embed?height=1300&wkst=2&ctz=Asia%2FJakarta&hl=id&mode=WEEK&showTz=0&showCalendars=0&src=YTJhMTBhNmZiNjgyMjBmM2JjNDU3MjA4ZDcxNjE5ZjljNWM4YzFlMzlkMjllNWFmZWJiMmRkZmI2MTU4NWI3NEBncm91cC5jYWxlbmRhci5nb29nbGUuY29t&src=aWQuaW5kb25lc2lhbiNob2xpZGF5QGdyb3VwLnYuY2FsZW5kYXIuZ29vZ2xlLmNvbQ&color=%23b39ddb&color=%23d81b60"></iframe>
</div>

<!-- MONTH -->
<div class="slide month">
<div class="nav-note note-nav">👉 Gunakan ❮ ❯ untuk pindah bulan</div>
<iframe src="https://calendar.google.com/calendar/embed?height=800&wkst=2&ctz=Asia%2FJakarta&hl=id&mode=MONTH&showTz=0&showCalendars=0&src=YTJhMTBhNmZiNjgyMjBmM2JjNDU3MjA4ZDcxNjE5ZjljNWM4YzFlMzlkMjllNWFmZWJiMmRkZmI2MTU4NWI3NEBncm91cC5jYWxlbmRhci5nb29nbGUuY29t&src=aWQuaW5kb25lc2lhbiNob2xpZGF5QGdyb3VwLnYuY2FsZW5kYXIuZ29vZ2xlLmNvbQ&color=%23b39ddb&color=%23d81b60"></iframe>
</div>

<!-- FULL -->
<div class="slide full">
<div class="nav-note note-info">📌 Jadwal mengajar + kegiatan lain</div>
<div class="nav-note note-nav">👉 Gunakan ❮ ❯ untuk pindah bulan</div>
<iframe src="https://calendar.google.com/calendar/embed?height=1400&wkst=2&ctz=Asia%2FJakarta&hl=id&mode=MONTH&showTz=0&src=ZGVzaGkua2FydW5pYUBydWFuZ2d1cnUuaWQ&src=YTJhMTBhNmZiNjgyMjBmM2JjNDU3MjA4ZDcxNjE5ZjljNWM4YzFlMzlkMjllNWFmZWJiMmRkZmI2MTU4NWI3NEBncm91cC5jYWxlbmRhci5nb29nbGUuY29t&src=aWQuaW5kb25lc2lhbiNob2xpZGF5QGdyb3VwLnYuY2FsZW5kYXIuZ29vZ2xlLmNvbQ&color=%237cb342&color=%23b39ddb&color=%23d81b60"></iframe>
</div>

</div>
</div>

<script>
let currentIndex = 1;
const slider = document.getElementById("slider");
const buttons = document.querySelectorAll(".tab-button");

function goToSlide(index) {
    currentIndex = index;
    slider.style.transform = `translateX(-${index * 100}%)`;

    buttons.forEach(b => b.classList.remove("active"));
    buttons[index].classList.add("active");

    triggerAnimation(index);
}

function triggerAnimation(index) {
    let notes = document.querySelectorAll(".slide")[index].querySelectorAll(".note-nav");
    notes.forEach(note => {
        note.classList.add("pulse");
        setTimeout(() => note.classList.remove("pulse"), 3000);
    });
}

// SWIPE
let startX = 0;
document.getElementById("swipeArea").addEventListener("touchstart", e => {
    startX = e.touches[0].clientX;
});

document.getElementById("swipeArea").addEventListener("touchend", e => {
    let endX = e.changedTouches[0].clientX;
    let diff = startX - endX;

    if (diff > 50 && currentIndex < 3) goToSlide(currentIndex + 1);
    if (diff < -50 && currentIndex > 0) goToSlide(currentIndex - 1);
});

// INIT
window.onload = () => triggerAnimation(1);
</script>

</body>
</html>
