<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jadwal RGP MTC Deshi</title>

<style>
body {
    font-family: Arial, sans-serif;
    margin: 0;
    background: #f4f6f9;
}

/* TOPBAR */
.topbar {
    position: sticky;
    top: 0;
    z-index: 1000;
    background: white;
    box-shadow: 0 2px 8px rgba(0,0,0,0.1);
}

header {
    background: #2c3e50;
    color: white;
    text-align: center;
    padding: 12px;
}

/* TABS */
.tabs {
    display: flex;
    overflow-x: auto;
    white-space: nowrap;
}

.tab-button {
    flex: 0 0 auto;
    padding: 10px 14px;
    border: none;
    background: none;
    cursor: pointer;
    font-size: 14px;
}

.tab-button.active {
    border-bottom: 3px solid #2c3e50;
    font-weight: bold;
}

/* TEXT CONTROL */
.full-text { display: inline; }
.short-text { display: none; }

/* MOBILE MODE */
@media (max-width: 600px) {
    .full-text { display: none; }
    .short-text { display: inline; }

    .tab-button {
        font-size: 13px;
        padding: 10px;
    }
}

/* SWIPE AREA */
.swipe-container {
    position: relative;
    height: calc(100vh - 110px);
    overflow: hidden;
}

/* SLIDES */
.slide {
    position: absolute;
    width: 100%;
    top: 0;
    left: 100%;
    opacity: 0;
    transition: all 0.3s ease;
    padding: 10px;
}

.slide.active {
    left: 0;
    opacity: 1;
}

.slide.prev {
    left: -100%;
}

/* NOTES */
.nav-note {
    font-size: 15px;
    font-weight: bold;
    text-align: center;
    margin-bottom: 10px;
    padding: 10px;
    border-radius: 10px;
}

.note-nav {
    color: #0b3d91;
    background: #e3f2fd;
    border: 2px solid #90caf9;
}

.note-info {
    color: #8a6d00;
    background: #fff8e1;
    border: 2px solid #ffd54f;
}

/* ANIMATION */
.pulse {
    animation: pulse 1.6s ease-in-out infinite;
}

@keyframes pulse {
    0% { transform: scale(1); }
    70% { transform: scale(1.03); }
    100% { transform: scale(1); }
}

/* IFRAME */
iframe {
    width: 100%;
    height: calc(100vh - 180px);
    border: none;
    border-radius: 8px;
}

</style>
</head>

<body>

<div class="topbar">
<header>JADWAL RGP MTC Deshi</header>

<div class="tabs">
<button class="tab-button" onclick="goTo(0)">
👩🏻‍🏫 <span class="full-text">Jadwal Mengajar</span><span class="short-text">Mengajar</span>
</button>

<button class="tab-button active" onclick="goTo(1)">
📆 <span class="full-text">Mingguan</span><span class="short-text">Minggu</span>
</button>

<button class="tab-button" onclick="goTo(2)">
📅 <span class="full-text">Bulanan</span><span class="short-text">Bulan</span>
</button>

<button class="tab-button" onclick="goTo(3)">
📋 <span class="full-text">Jadwal Full</span><span class="short-text">Full</span>
</button>
</div>
</div>

<div class="swipe-container" id="swipe">

<!-- AGENDA -->
<div class="slide" id="s0">
<div class="nav-note note-nav">👉 Gunakan ❮ ❯ untuk pindah hari</div>
<iframe src="https://calendar.google.com/calendar/embed?mode=AGENDA&ctz=Asia%2FJakarta&src=YTJhMTBhNmZiNjgyMjBmM2JjNDU3MjA4ZDcxNjE5ZjljNWM4YzFlMzlkMjllNWFmZWJiMmRkZmI2MTU4NWI3NEBncm91cC5jYWxlbmRhci5nb29nbGUuY29t&color=%23b39ddb"></iframe>
</div>

<!-- WEEK -->
<div class="slide active" id="s1">
<div class="nav-note note-nav">👉 Gunakan ❮ ❯ untuk pindah minggu</div>
<iframe src="https://calendar.google.com/calendar/embed?mode=WEEK&ctz=Asia%2FJakarta&src=YTJhMTBhNmZiNjgyMjBmM2JjNDU3MjA4ZDcxNjE5ZjljNWM4YzFlMzlkMjllNWFmZWJiMmRkZmI2MTU4NWI3NEBncm91cC5jYWxlbmRhci5nb29nbGUuY29t&color=%23d81b60"></iframe>
</div>

<!-- MONTH -->
<div class="slide" id="s2">
<div class="nav-note note-nav">👉 Gunakan ❮ ❯ untuk pindah bulan</div>
<iframe src="https://calendar.google.com/calendar/embed?mode=MONTH&ctz=Asia%2FJakarta&src=YTJhMTBhNmZiNjgyMjBmM2JjNDU3MjA4ZDcxNjE5ZjljNWM4YzFlMzlkMjllNWFmZWJiMmRkZmI2MTU4NWI3NEBncm91cC5jYWxlbmRhci5nb29nbGUuY29t&color=%23b39ddb"></iframe>
</div>

<!-- FULL -->
<div class="slide" id="s3">
<div class="nav-note note-info">📌 Jadwal mengajar + kegiatan lain</div>
<div class="nav-note note-nav">👉 Gunakan ❮ ❯ untuk pindah bulan</div>
<iframe src="https://calendar.google.com/calendar/embed?mode=MONTH&ctz=Asia%2FJakarta&src=ZGVzaGkua2FydW5pYUBydWFuZ2d1cnUuaWQ&color=%237cb342"></iframe>
</div>

</div>

<script>
let current = 1;

function goTo(i){
    document.querySelectorAll(".slide").forEach((s,idx)=>{
        s.classList.remove("active","prev");
        if(idx === i) s.classList.add("active");
        if(idx < i) s.classList.add("prev");
    });

    document.querySelectorAll(".tab-button").forEach((b,idx)=>{
        b.classList.toggle("active", idx===i);
    });

    current = i;
    triggerAnimation(i);
}

function triggerAnimation(i){
    let notes = document.querySelectorAll(".slide")[i].querySelectorAll(".note-nav");
    notes.forEach(n=>{
        n.classList.add("pulse");
        setTimeout(()=>n.classList.remove("pulse"),3000);
    });
}

/* SWIPE */
let startX = 0;

document.getElementById("swipe").addEventListener("touchstart",e=>{
    startX = e.touches[0].clientX;
});

document.getElementById("swipe").addEventListener("touchend",e=>{
    let diff = startX - e.changedTouches[0].clientX;

    if(diff > 50 && current < 3) goTo(current+1);
    if(diff < -50 && current > 0) goTo(current-1);
});

window.onload = ()=>triggerAnimation(1);
</script>

</body>
</html>
